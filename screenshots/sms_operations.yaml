dashboard_title: SMS Operations

charts:

  - title: SMS per day
    datasource: messages_mart
    type: timeseries

  - title: Delivery Rate
    type: big_number
    metric:
      SQL: |
        SELECT
          countIf(delivery_status = 'DELIVRD') / count()
        FROM sms.messages_mart
        WHERE deleted_at IS NULL

  - title: Revenue
    type: big_number
    metric:
      SQL: |
        SELECT sum(price)
        FROM sms.messages_mart

  - title: Top countries
    type: bar

  - title: Top operators
    type: pie