dashboard_title: SMS Data Quality

charts:

  - title: Duplicate message_id
    SQL: |
      SELECT count(*)
      FROM (
          SELECT message_id, count()
          FROM sms.messages_mart
          GROUP BY message_id
          HAVING count() > 1
      )

  - title: Deleted records rate
    SQL: |
      SELECT countIf(deleted_at IS NOT NULL) / count()
      FROM sms.messages_mart

  - title: Status distribution
    SQL: |
      SELECT delivery_status, count()
      FROM sms.messages_mart
      GROUP BY delivery_status