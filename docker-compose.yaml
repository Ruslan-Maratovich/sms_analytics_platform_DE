services:

  keeper01:
    image: clickhouse/clickhouse-keeper:25.3
    networks:
      - sms_network
    container_name: keeper01

    hostname: keeper01

    volumes:
      - keeper01_data:/var/lib/clickhouse-keeper
      - ./keeper/keeper01/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml

    ports:
      - "9181:9181"

    command:
      [
        "clickhouse-keeper",
        "--config-file=/etc/clickhouse-keeper/keeper_config.xml"
      ]
  

  keeper02:
    image: clickhouse/clickhouse-keeper:25.3
    networks:
      - sms_network
    container_name: keeper02

    hostname: keeper02

    volumes:
      - keeper02_data:/var/lib/clickhouse-keeper
      - ./keeper/keeper02/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml

    ports:
      - "9182:9181"

    command:
      [
        "clickhouse-keeper",
        "--config-file=/etc/clickhouse-keeper/keeper_config.xml"
      ]

  keeper03:

    image: clickhouse/clickhouse-keeper:25.3
    networks:
      - sms_network
    container_name: keeper03

    hostname: keeper03

    volumes:
      - keeper03_data:/var/lib/clickhouse-keeper
      - ./keeper/keeper03/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml


    ports:
      - "9183:9181"


    command:
      [
        "clickhouse-keeper",
        "--config-file=/etc/clickhouse-keeper/keeper_config.xml"
      ]


  clickhouse01:
    image: clickhouse/clickhouse-server:25.3
    container_name: clickhouse01
    hostname: clickhouse01

    depends_on:
      - keeper01
      - keeper02
      - keeper03

    ports:
      - "8123:8123"
      - "9000:9000"

    networks:
        - sms_network
    
    volumes:
      - clickhouse01_data:/var/lib/clickhouse
      - ./clickhouse/clickhouse01/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ./clickhouse/clickhouse01/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./clickhouse/clickhouse01/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./clickhouse/clickhouse01/users.d:/etc/clickhouse-server/users.d

    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user",
          "default",
          "--password",
          "default123",
          "--query",
          "SELECT 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  clickhouse02:
    image: clickhouse/clickhouse-server:25.3
    container_name: clickhouse02
    networks:
      - sms_network
    hostname: clickhouse02

    depends_on:
      - keeper01
      - keeper02
      - keeper03

    ports:
      - "8124:8123"
      - "9001:9000"

    volumes:
      - clickhouse02_data:/var/lib/clickhouse
      - ./clickhouse/clickhouse02/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ./clickhouse/clickhouse02/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./clickhouse/clickhouse02/users.xml:/etc/clickhouse-server/users.d/users.xml

  clickhouse03:
    image: clickhouse/clickhouse-server:25.3
    networks:
      - sms_network
    container_name: clickhouse03
    hostname: clickhouse03

    depends_on:
      - keeper01
      - keeper02
      - keeper03

    ports:
      - "8125:8123"
      - "9002:9000"

    volumes:
      - clickhouse03_data:/var/lib/clickhouse
      - ./clickhouse/clickhouse03/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ./clickhouse/clickhouse03/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./clickhouse/clickhouse03/users.xml:/etc/clickhouse-server/users.d/users.xml

  clickhouse-init:
    image: clickhouse/clickhouse-server:25.3

    networks:
      - sms_network

    container_name: clickhouse-init

    depends_on:
      clickhouse01:
        condition: service_healthy

    volumes:
      - ./clickhouse/ddl/init.sql:/init.sql

    entrypoint:
      [
        "bash",
        "-c",
        "clickhouse-client --host clickhouse01 --user default --password default123 --multiquery < /init.sql"
      ]

  generator:
    build:
      context: ./generator
    
    networks:
      - sms_network

    container_name: sms_generator

    depends_on:
      clickhouse-init:
        condition: service_completed_successfully

    command:
      ["python", "generate.py", "--rows", "1000000"]

  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile

    container_name: superset

    networks:
        - sms_network

    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
        
    ports:
      - "8088:8088"

    environment:
      SUPERSET_SECRET_KEY: super-secret-key
      PYTHONPATH: /app/pythonpath

    volumes:
      - superset_home:/app/superset_home

    restart: unless-stopped
  
  postgres:
    image: postgres:16
    container_name: airflow-postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    volumes:
      - airflow_postgres:/var/lib/postgresql/data

    networks:
      - sms_network

  redis:
    image: redis:7
    container_name: airflow-redis

    networks:
      - sms_network
  
  airflow-init:
    build:
      context: ./airflow
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
          
    networks:
      - sms_network
  
  airflow-scheduler:
    build:
      context: ./airflow
    container_name: airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    networks:
      - sms_network
  
  airflow-webserver:
    build:
      context: ./airflow
    container_name: airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    networks:
      - sms_network

  airflow-worker:
    build:
      context: ./airflow
    container_name: airflow-worker
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: celery worker
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    networks:
      - sms_network

networks:
  sms_network:
    driver: bridge

volumes:  
  keeper01_data:
  keeper02_data:
  keeper03_data:

  clickhouse01_data:
  clickhouse02_data:
  clickhouse03_data:
  
  superset_home:

  airflow_postgres:

