services:

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: clickhouse

    ports:
      - "8123:8123"
      - "9000:9000"

    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: default123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/ddl/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./clickhouse/ddl:/ddl

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  generator:
    build:
      context: ./generator

    container_name: sms_generator

    depends_on:
      clickhouse:
        condition: service_healthy

    command:
      ["python", "generate.py", "--rows", "1000000"]

  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile

    container_name: superset

    depends_on:
      clickhouse:
        condition: service_healthy

    ports:
      - "8088:8088"

    environment:
      SUPERSET_SECRET_KEY: super-secret-key
      PYTHONPATH: /app/pythonpath

    volumes:
      - superset_home:/app/superset_home

    restart: unless-stopped


volumes:
  clickhouse_data:
  superset_home:

